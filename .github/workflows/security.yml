name: Security Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit safety bandit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        cd frontend && npm install

    - name: Run Bandit (Backend AST Security Scan)
      run: bandit -r backend/

    - name: Run Safety (Backend Dependency Scan)
      run: safety check -r requirements.txt --full-report

    - name: Run Pip-Audit (Backend Dependency Vulnerability Scan)
      run: pip-audit -r requirements.txt

    - name: Run NPM Audit (Frontend Dependency Scan)
      run: |
        cd frontend
        npm audit --audit-level=high
